spring.application.name=sistema-controle-estoque
server.port=8080
server.servlet.context-path=/

# 1. URL CORRIGIDA: Adicionados parâmetros essenciais de Timezone e SSL para evitar erros de conexão no MySQL do Ubuntu
spring.datasource.url=jdbc:mysql://localhost:3306/controle_estoque?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false
spring.datasource.username=root
# 2. SENHA CORRIGIDA: Altere para 'root123' (ou a senha exata que você testou e funcionou no DBeaver)
spring.datasource.password=thais153
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. DIALETO CORRIGIDO: O 'MySQL8Dialect' foi depreciado nas versões recentes do Hibernate (Spring Boot 3.x). 
# Deixamos o dialeto genérico moderno do MySQL para o Hibernate gerenciar de forma segura.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
# Mudamos para true para você ver o SQL no console junto com o log de DEBUG
spring.jpa.show-sql=true 
spring.jpa.properties.hibernate.format_sql=true

logging.level.root=INFO
logging.level.com.estoque.sistemacontroleestoque=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# JWT
jwt.secret=4A2C3D9E1F7B6A8C5E2D4F1A3B9C7E6D4A2C3D9E1F7B6A8C5E2D4F1A3B9C7E6D
jwt.expiration=900000
jwt.refresh-expiration=604800000