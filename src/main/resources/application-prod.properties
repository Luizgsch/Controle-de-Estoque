spring.application.name=sistema-controle-estoque
server.port=8080
server.servlet.context-path=/

spring.datasource.url=jdbc:mysql://db-server:3306/controle_estoque
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

logging.level.root=WARN
logging.level.com.estoque.sistemacontroleestoque=INFO
logging.file.name=/var/log/estoque/application.log
logging.file.max-size=10MB
logging.file.max-history=7

spring.jackson.default-property-inclusion=non_null

management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=when-authorized
