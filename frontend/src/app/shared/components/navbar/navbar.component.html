<header class="bg-slate-900 border-b border-slate-700 h-16 flex items-center px-4 gap-3 shrink-0">
  <!-- Hamburger: apenas mobile -->
  <button
    (click)="onToggleSidebar()"
    class="lg:hidden p-2 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors"
    aria-label="Alternar menu"
  >
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
    </svg>
  </button>

  <!-- Título visível apenas no mobile (sidebar tem a marca no desktop) -->
  <span class="lg:hidden text-base font-semibold text-white">Controle de Estoque</span>

  <div class="flex-1"></div>

  <!-- Avatar -->
  <div class="w-9 h-9 rounded-full bg-indigo-600 flex items-center justify-center text-white text-sm font-bold select-none ring-2 ring-indigo-500">
    U
  </div>
</header>
