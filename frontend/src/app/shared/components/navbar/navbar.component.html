<header class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-10 h-16 flex items-center px-4 gap-3">
  <!-- Hamburger -->
  <button
    (click)="onToggleSidebar()"
    class="p-2 rounded-lg text-gray-500 hover:bg-gray-100 transition"
    aria-label="Toggle sidebar"
  >
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
    </svg>
  </button>

  <!-- Logo/Title -->
  <span class="text-lg font-semibold text-gray-800">Controle de Estoque</span>

  <!-- Spacer -->
  <div class="flex-1"></div>

  <!-- Avatar placeholder -->
  <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-sm font-bold select-none">
    U
  </div>
</header>
