<div
  *ngIf="notification"
  class="fixed top-4 right-4 z-50 p-4 rounded-lg shadow-lg text-white flex items-center gap-3 max-w-sm transition-all"
  [ngClass]="{
    'bg-green-500': notification.type === 'success',
    'bg-red-500': notification.type === 'error',
    'bg-blue-500': notification.type === 'info'
  }"
>
  <span class="text-lg font-bold shrink-0">{{ getIcon() }}</span>
  <span class="flex-1 text-sm">{{ notification.message }}</span>
  <button (click)="dismiss()" class="shrink-0 hover:opacity-75 text-lg font-bold leading-none">×</button>
</div>
