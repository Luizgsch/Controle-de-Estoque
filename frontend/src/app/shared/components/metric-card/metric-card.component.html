<div
  class="bg-white rounded-xl p-6 shadow-sm border border-slate-200 border-l-4 hover:shadow-md transition-shadow cursor-default"
  [ngClass]="borderClass"
>
  <div class="flex items-start justify-between">
    <div class="flex-1 min-w-0">
      <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-3">{{ title }}</p>
      <p class="text-3xl font-bold" [ngClass]="valueColorClass">
        <ng-container *ngIf="isCurrency; else plain">
          {{ +value | appCurrency }}
        </ng-container>
        <ng-template #plain>{{ value }}</ng-template>
      </p>
    </div>

    <!-- Ícone currency -->
    <div *ngIf="iconType === 'currency'"
      class="w-12 h-12 rounded-xl flex items-center justify-center ml-4 shrink-0"
      [ngClass]="iconBgClass">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    </div>

    <!-- Ícone box -->
    <div *ngIf="iconType === 'box'"
      class="w-12 h-12 rounded-xl flex items-center justify-center ml-4 shrink-0"
      [ngClass]="iconBgClass">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
      </svg>
    </div>

    <!-- Ícone alert -->
    <div *ngIf="iconType === 'alert'"
      class="w-12 h-12 rounded-xl flex items-center justify-center ml-4 shrink-0"
      [ngClass]="iconBgClass">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
    </div>
  </div>
</div>
