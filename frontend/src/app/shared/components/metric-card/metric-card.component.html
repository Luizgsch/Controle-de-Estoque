<div
  class="bg-white rounded-xl p-6 shadow-sm border border-gray-100 border-l-4 transition-transform duration-150 hover:scale-[1.02] cursor-default"
  [ngClass]="highlight ? 'border-l-orange-500' : 'border-l-blue-500'"
>
  <div class="flex items-start justify-between">
    <div class="flex-1">
      <p class="text-sm font-medium text-gray-500 uppercase tracking-wide">{{ title }}</p>
      <p
        class="text-3xl font-bold mt-2"
        [ngClass]="highlight ? 'text-orange-600' : 'text-gray-900'"
      >
        <ng-container *ngIf="isCurrency; else plain">
          {{ +value | appCurrency }}
        </ng-container>
        <ng-template #plain>{{ value }}</ng-template>
      </p>
    </div>
    <span class="text-4xl opacity-20 ml-4">{{ icon }}</span>
  </div>
</div>
