<!-- Backdrop -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 px-4" (click)="onCancel()">
  <!-- Modal -->
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg" (click)="$event.stopPropagation()">
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200">
      <h3 class="text-lg font-semibold text-slate-900">
        {{ isEdit ? 'Editar Produto' : 'Novo Produto' }}
      </h3>
      <button (click)="onCancel()"
        class="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-lg transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Body -->
    <form [formGroup]="form" (ngSubmit)="onSave()" novalidate class="px-6 py-5 space-y-4">
      <!-- Nome -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Nome *</label>
        <input formControlName="nome" type="text" placeholder="Nome do produto"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition"
          [ngClass]="nome.invalid && nome.touched ? 'border-red-400' : ''">
        <p *ngIf="nome.invalid && nome.touched" class="mt-1 text-xs text-red-600">Nome é obrigatório</p>
      </div>

      <!-- SKU + Categoria -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">SKU *</label>
          <input formControlName="sku" type="text" placeholder="Ex: PRD-001"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm text-slate-900 font-mono placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition"
            [ngClass]="sku.invalid && sku.touched ? 'border-red-400' : ''">
          <p *ngIf="sku.invalid && sku.touched" class="mt-1 text-xs text-red-600">SKU é obrigatório</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Categoria</label>
          <input formControlName="categoria" type="text" placeholder="Ex: Eletrônicos"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition">
        </div>
      </div>

      <!-- Preço + Quantidade + Mínimo -->
      <div class="grid grid-cols-3 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Preço (R$) *</label>
          <input formControlName="preco" type="number" step="0.01" min="0" placeholder="0,00"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition"
            [ngClass]="preco.invalid && preco.touched ? 'border-red-400' : ''">
          <p *ngIf="preco.invalid && preco.touched" class="mt-1 text-xs text-red-600">Preço inválido</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Qtd. Atual</label>
          <input formControlName="quantidade" type="number" min="0"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Qtd. Mínima</label>
          <input formControlName="quantidadeMinima" type="number" min="0"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition">
        </div>
      </div>

      <!-- Descrição -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Descrição</label>
        <textarea formControlName="descricao" rows="2" placeholder="Opcional…"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition resize-none"></textarea>
      </div>

      <!-- Footer -->
      <div class="flex justify-end gap-3 pt-2">
        <button type="button" (click)="onCancel()"
          class="px-4 py-2 text-sm text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-lg transition font-medium">
          Cancelar
        </button>
        <button type="submit" [disabled]="loading"
          class="px-5 py-2 text-sm text-white bg-indigo-600 hover:bg-indigo-700 disabled:opacity-60 rounded-lg transition font-semibold">
          {{ isEdit ? 'Salvar Alterações' : 'Criar Produto' }}
        </button>
      </div>
    </form>
  </div>
</div>
