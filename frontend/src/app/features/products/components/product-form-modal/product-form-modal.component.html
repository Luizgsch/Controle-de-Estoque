<!-- Backdrop -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 px-4" (click)="onCancel()">
  <!-- Modal -->
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg" (click)="$event.stopPropagation()">
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
      <h3 class="text-lg font-semibold text-gray-900">
        {{ isEdit ? 'Editar Produto' : 'Novo Produto' }}
      </h3>
      <button (click)="onCancel()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">×</button>
    </div>

    <!-- Body -->
    <form [formGroup]="form" (ngSubmit)="onSave()" novalidate class="px-6 py-5 space-y-4">
      <!-- Nome -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nome *</label>
        <input formControlName="nome" type="text" placeholder="Nome do produto"
          class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          [ngClass]="nome.invalid && nome.touched ? 'border-red-400' : 'border-gray-300'">
        <p *ngIf="nome.invalid && nome.touched" class="mt-1 text-xs text-red-600">Nome é obrigatório</p>
      </div>

      <!-- SKU + Categoria -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">SKU *</label>
          <input formControlName="sku" type="text" placeholder="Ex: PRD-001"
            class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            [ngClass]="sku.invalid && sku.touched ? 'border-red-400' : 'border-gray-300'">
          <p *ngIf="sku.invalid && sku.touched" class="mt-1 text-xs text-red-600">SKU é obrigatório</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Categoria</label>
          <input formControlName="categoria" type="text" placeholder="Ex: Eletrônicos"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
      </div>

      <!-- Preço + Quantidade + Mínimo -->
      <div class="grid grid-cols-3 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Preço (R$) *</label>
          <input formControlName="preco" type="number" step="0.01" min="0" placeholder="0,00"
            class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            [ngClass]="preco.invalid && preco.touched ? 'border-red-400' : 'border-gray-300'">
          <p *ngIf="preco.invalid && preco.touched" class="mt-1 text-xs text-red-600">Preço inválido</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Qtd. Atual</label>
          <input formControlName="quantidade" type="number" min="0"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Qtd. Mínima</label>
          <input formControlName="quantidadeMinima" type="number" min="0"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
      </div>

      <!-- Descricao -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Descrição</label>
        <textarea formControlName="descricao" rows="2" placeholder="Opcional…"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
      </div>

      <!-- Footer -->
      <div class="flex justify-end gap-3 pt-2">
        <button type="button" (click)="onCancel()"
          class="px-4 py-2 text-sm text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg transition">
          Cancelar
        </button>
        <button type="submit" [disabled]="loading"
          class="px-5 py-2 text-sm text-white bg-blue-600 hover:bg-blue-700 disabled:opacity-60 rounded-lg transition font-medium">
          Salvar Produto
        </button>
      </div>
    </form>
  </div>
</div>
