<!-- Backdrop -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 px-4" (click)="onCancel()">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm" (click)="$event.stopPropagation()">
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200">
      <div>
        <h3 class="text-lg font-semibold text-slate-900">Ajuste de Estoque</h3>
        <p class="text-xs text-slate-500 mt-0.5">{{ produto.nome }}</p>
      </div>
      <button (click)="onCancel()"
        class="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-lg transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Body -->
    <div class="px-6 py-5">
      <!-- Estoque atual -->
      <div class="flex items-center justify-between text-sm bg-slate-50 rounded-lg px-4 py-3 mb-5">
        <span class="text-slate-500">Estoque atual</span>
        <span class="font-bold text-slate-900">{{ produto.quantidade }}</span>
      </div>

      <form [formGroup]="form" (ngSubmit)="onConfirm()" novalidate>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">
          Quantidade <span class="text-slate-400 font-normal">(positivo = entrada, negativo = saída)</span>
        </label>
        <input
          formControlName="quantidade"
          type="number"
          placeholder="Ex: 10 ou -5"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition mb-4"
        >

        <!-- Preview novo estoque -->
        <div class="flex items-center justify-between text-sm mb-5 rounded-lg px-4 py-3"
          [ngClass]="newStock < 0 ? 'bg-red-50' : 'bg-indigo-50'">
          <span class="text-slate-600">Novo estoque será:</span>
          <span
            class="font-bold text-lg"
            [ngClass]="newStock < 0 ? 'text-red-600' : 'text-indigo-700'"
          >{{ newStock }}</span>
        </div>

        <div class="flex justify-end gap-3">
          <button type="button" (click)="onCancel()"
            class="px-4 py-2 text-sm text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-lg transition font-medium">
            Cancelar
          </button>
          <button type="submit" [disabled]="newStock < 0"
            class="px-5 py-2 text-sm text-white bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 rounded-lg transition font-semibold">
            Confirmar Movimentação
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
