<!-- Backdrop -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 px-4" (click)="onCancel()">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm" (click)="$event.stopPropagation()">
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
      <h3 class="text-lg font-semibold text-gray-900">Ajuste de Estoque</h3>
      <button (click)="onCancel()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">×</button>
    </div>

    <!-- Body -->
    <div class="px-6 py-5">
      <p class="text-sm text-gray-500 mb-1">Ajustando estoque de:</p>
      <p class="text-base font-semibold text-gray-900 mb-4">{{ produto.nome }}</p>

      <div class="flex items-center justify-between text-sm text-gray-600 mb-5 bg-gray-50 rounded-lg px-4 py-3">
        <span>Estoque atual</span>
        <span class="font-bold text-gray-900">{{ produto.quantidade }}</span>
      </div>

      <form [formGroup]="form" (ngSubmit)="onConfirm()" novalidate>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Quantidade (positivo = entrada, negativo = saída)
        </label>
        <input
          formControlName="quantidade"
          type="number"
          placeholder="Ex: 10 ou -5"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 mb-3"
        >

        <!-- Preview -->
        <div class="flex items-center justify-between text-sm mb-5 bg-blue-50 rounded-lg px-4 py-3">
          <span class="text-gray-600">Novo estoque será:</span>
          <span
            class="font-bold text-lg"
            [ngClass]="newStock < 0 ? 'text-red-600' : 'text-blue-700'"
          >{{ newStock }}</span>
        </div>

        <div class="flex justify-end gap-3">
          <button type="button" (click)="onCancel()"
            class="px-4 py-2 text-sm text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg transition">
            Cancelar
          </button>
          <button type="submit" [disabled]="newStock < 0"
            class="px-5 py-2 text-sm text-white bg-blue-600 hover:bg-blue-700 disabled:opacity-50 rounded-lg transition font-medium">
            Confirmar Movimentação
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
