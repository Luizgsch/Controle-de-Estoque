<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-lg px-8 py-10">
      <!-- Logo -->
      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-gray-900">Controle de Estoque</h1>
        <p class="text-sm text-gray-500 mt-1">Acesse sua conta</p>
      </div>

      <!-- Error message -->
      <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">
        {{ errorMessage }}
      </div>

      <!-- Form -->
      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <!-- Email -->
        <div class="mb-5">
          <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
          <input
            type="email"
            formControlName="email"
            placeholder="seu@email.com"
            class="w-full px-4 py-2.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
            [ngClass]="{
              'border-red-400 bg-red-50': email.invalid && email.touched,
              'border-gray-300': !(email.invalid && email.touched)
            }"
          />
          <p *ngIf="email.invalid && email.touched" class="mt-1 text-xs text-red-600">
            <span *ngIf="email.errors?.['required']">E-mail é obrigatório</span>
            <span *ngIf="email.errors?.['email']">E-mail inválido</span>
          </p>
        </div>

        <!-- Password -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
          <div class="relative">
            <input
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="••••••••"
              class="w-full px-4 py-2.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition pr-10"
              [ngClass]="{
                'border-red-400 bg-red-50': password.invalid && password.touched,
                'border-gray-300': !(password.invalid && password.touched)
              }"
            />
            <button
              type="button"
              (click)="showPassword = !showPassword"
              class="absolute inset-y-0 right-3 flex items-center text-gray-400 hover:text-gray-600"
            >
              <span class="text-sm">{{ showPassword ? '🙈' : '👁' }}</span>
            </button>
          </div>
          <p *ngIf="password.invalid && password.touched" class="mt-1 text-xs text-red-600">
            Senha é obrigatória
          </p>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="loading"
          class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 disabled:opacity-60 disabled:cursor-not-allowed text-white font-semibold rounded-lg transition text-sm"
        >
          <span *ngIf="!loading">Entrar</span>
          <span *ngIf="loading">Entrando…</span>
        </button>
      </form>

      <!-- Forgot password -->
      <p class="text-center mt-5 text-sm text-gray-400">
        <a href="#" class="hover:text-gray-600 transition">Esqueceu sua senha?</a>
      </p>
    </div>
  </div>
</div>
