<div class="min-h-screen flex">
  <!-- Painel esquerdo — visível apenas md+ -->
  <div class="hidden md:flex md:w-2/5 bg-gradient-to-br from-indigo-700 to-indigo-900 flex-col items-center justify-center px-10 text-white">
    <div class="w-16 h-16 bg-white/10 rounded-2xl flex items-center justify-center mb-6">
      <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
      </svg>
    </div>
    <h2 class="text-2xl font-bold text-center mb-3">Controle de Estoque</h2>
    <p class="text-indigo-200 text-sm text-center leading-relaxed max-w-xs">
      Gerencie seu inventário com agilidade e precisão. Visibilidade total do seu estoque em tempo real.
    </p>
    <div class="mt-12 flex gap-2 opacity-30">
      <div class="w-2 h-2 rounded-full bg-white"></div>
      <div class="w-8 h-2 rounded-full bg-white"></div>
      <div class="w-2 h-2 rounded-full bg-white"></div>
    </div>
  </div>

  <!-- Painel direito — form -->
  <div class="flex-1 flex items-center justify-center px-6 py-12 bg-white">
    <div class="w-full max-w-sm">
      <!-- Cabeçalho mobile -->
      <div class="md:hidden text-center mb-8">
        <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center mx-auto mb-3">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
          </svg>
        </div>
        <h1 class="text-xl font-bold text-slate-900">Controle de Estoque</h1>
      </div>

      <h3 class="text-2xl font-bold text-slate-900 mb-1">Bem-vindo de volta</h3>
      <p class="text-sm text-slate-500 mb-8">Acesse sua conta para continuar</p>

      <!-- Erro -->
      <div *ngIf="errorMessage" class="mb-5 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700 flex items-center gap-2">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
        {{ errorMessage }}
      </div>

      <!-- Form -->
      <form [formGroup]="form" (ngSubmit)="submit()" novalidate class="space-y-5">
        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">E-mail</label>
          <input
            type="email"
            formControlName="email"
            placeholder="seu@email.com"
            class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition"
            [ngClass]="{ 'border-red-400 bg-red-50 focus:ring-red-400': email.invalid && email.touched }"
          />
          <p *ngIf="email.invalid && email.touched" class="mt-1 text-xs text-red-600">
            <span *ngIf="email.errors?.['required']">E-mail obrigatório</span>
            <span *ngIf="email.errors?.['email']">E-mail inválido</span>
          </p>
        </div>

        <!-- Senha -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Senha</label>
          <div class="relative">
            <input
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="••••••••"
              class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition pr-10"
              [ngClass]="{ 'border-red-400 bg-red-50 focus:ring-red-400': password.invalid && password.touched }"
            />
            <button
              type="button"
              (click)="showPassword = !showPassword"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition"
              tabindex="-1"
            >
              <svg *ngIf="!showPassword" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
              <svg *ngIf="showPassword" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
              </svg>
            </button>
          </div>
          <p *ngIf="password.invalid && password.touched" class="mt-1 text-xs text-red-600">
            Senha obrigatória
          </p>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="loading"
          class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-60 disabled:cursor-not-allowed text-white font-semibold rounded-lg transition text-sm mt-2"
        >
          <span *ngIf="!loading">Entrar</span>
          <span *ngIf="loading" class="flex items-center justify-center gap-2">
            <svg class="animate-spin w-4 h-4" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" class="opacity-25"/>
              <path d="M4 12a8 8 0 018-8" stroke="currentColor" stroke-width="4" class="opacity-75"/>
            </svg>
            Entrando…
          </span>
        </button>
      </form>

      <p class="text-center mt-6 text-sm text-slate-400">
        <a href="#" class="hover:text-slate-600 transition">Esqueceu sua senha?</a>
      </p>
    </div>
  </div>
</div>
