<div>
  <h2 class="text-2xl font-bold text-slate-900 mb-6">Dashboard</h2>

  <!-- Loading -->
  <div *ngIf="loading" class="flex items-center gap-2 text-slate-500">
    <svg class="animate-spin w-5 h-5" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" class="opacity-25"/>
      <path d="M4 12a8 8 0 018-8" stroke="currentColor" stroke-width="4" class="opacity-75"/>
    </svg>
    <span class="text-sm">Carregando métricas…</span>
  </div>

  <!-- Metric Cards -->
  <div *ngIf="!loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    <app-metric-card
      title="Valor Total em Estoque"
      [value]="totalValue"
      [isCurrency]="true"
      colorScheme="indigo"
      iconType="currency"
    ></app-metric-card>

    <app-metric-card
      title="Giro de Produtos"
      [value]="totalItems + ' itens'"
      colorScheme="emerald"
      iconType="box"
    ></app-metric-card>

    <app-metric-card
      title="Alertas Críticos"
      [value]="lowStockCount"
      colorScheme="amber"
      iconType="alert"
    ></app-metric-card>
  </div>

  <!-- Link para produtos com estoque baixo -->
  <div *ngIf="!loading && lowStockCount > 0" class="mt-6">
    <a
      routerLink="/produtos"
      class="inline-flex items-center gap-1.5 text-sm text-amber-600 hover:text-amber-700 font-medium"
    >
      Ver produtos com estoque baixo
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
      </svg>
    </a>
  </div>
</div>
