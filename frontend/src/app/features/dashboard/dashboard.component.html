<div>
  <h2 class="text-2xl font-bold text-gray-900 mb-6">Dashboard</h2>

  <!-- Loading -->
  <div *ngIf="loading" class="flex items-center gap-2 text-gray-500">
    <svg class="animate-spin w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <circle cx="12" cy="12" r="10" stroke-width="4" class="opacity-25"/>
      <path d="M4 12a8 8 0 018-8" stroke-width="4" class="opacity-75"/>
    </svg>
    <span class="text-sm">Carregando métricas…</span>
  </div>

  <!-- Metric Cards -->
  <div *ngIf="!loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    <app-metric-card
      title="Valor Total em Estoque"
      [value]="totalValue"
      icon="💰"
      [isCurrency]="true"
    ></app-metric-card>

    <app-metric-card
      title="Giro de Produtos"
      [value]="totalItems + ' itens'"
      icon="📦"
    ></app-metric-card>

    <app-metric-card
      title="Alertas Críticos"
      [value]="lowStockCount"
      icon="⚠️"
      [highlight]="lowStockCount > 0"
    ></app-metric-card>
  </div>

  <!-- Quick link to products if alerts exist -->
  <div *ngIf="!loading && lowStockCount > 0" class="mt-6">
    <a
      routerLink="/produtos"
      class="text-sm text-orange-600 hover:text-orange-700 font-medium underline underline-offset-2"
    >
      Ver produtos com estoque baixo →
    </a>
  </div>
</div>
